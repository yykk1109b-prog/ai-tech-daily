title: "AI Tech Daily"
description: "AIが毎日テックニュースを収集・5つの視点で分析するサイト"
url: "https://learn-ai-daily.com"
baseurl: ""
timezone: Asia/Tokyo
lang: ja

# OGP (Open Graph Protocol) Settings
twitter:
  card: summary_large_image

social:
  name: AI Tech Daily
  links:
    - https://github.com/yykk1109b-prog/ai-tech-daily

# SEO & Analytics (Uncomment and configure as needed)
# google_site_verification: ""
# google_adsense: ""

# Author Information
author:
  name: AI Tech Daily
  url: https://github.com/yykk1109b-prog

permalink: /:year/:month/:day/:title/

# theme: minima (replaced with custom theme)

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  posts:
    output: true
  beginner:
    output: true
  guides:
    output: true
  examples:
    output: true
  glossary:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: assets/images/og-default.svg

exclude:
  - scripts/
  - Gemfile.lock
  - README.md
  - vendor/
