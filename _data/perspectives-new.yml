# AI Tech News - ライティングスタイル定義
# TechCrunch Japan × Engadget Japan のハイブリッドスタイル

---
article_style:
  name: "TechCrunch Japan × Engadget Japan ハイブリッド"
  description: "ビジネス情報と読みやすさを両立したテックニューススタイル"

  # 基本ルール
  rules:
    - "段落は短く（2〜4文）"
    - "一文は15〜20文字程度"
    - "能動態で書く（〜が〜した）"
    - "数字、企業名、製品名を具体的に"
    - "専門用語は初出時に簡潔な説明を添える"
    - "「誰が・何を・いつ・なぜ」を明確に"

  # 見出しスタイル
  heading_rules:
    - "ラベル型見出し禁止（「速報まとめ」「開発者視点」など）"
    - "内容を示す具体的な見出し（「なぜOpenAIは急いでリリースしたのか」など）"
    - "興味を引く言葉や数字を含める"

---

# 各ニュースの構成
news_structure:
  # 1. 要約（必須）
  summary:
    label: "要約"
    min_chars: 150
    max_chars: 300
    rules:
      - "5W1H（誰が・何を・いつ・どこで・なぜ・どう）を含める"
      - "主要な数字やスペックを明記"
      - "事実を簡潔に伝える。評論や解説は後のセクションで"
      - "H2見出しの直後に、引用ブロックなしで本文として記述"

  # 2. 深掘りセクション（2〜3個を選択）
  deep_dives:
    - id: "tech_points"
      name: "技術的なポイント"
      icon: ""
      when: "新しいAPI、モデル、ツールのリリース等"
      min_chars: 200
      max_chars: 400
      rules:
        - "具体的な技術スタック・アーキテクチャへの言及"
        - "API、SDK、フレームワーク名を具体的に"
        - "可能であればコマンド例や設定例を含める"
        - "どう使うか、どう組み込むかに焦点"

    - id: "business_impact"
      name: "ビジネスへの影響"
      icon: ""
      when: "資金調達、M&A、市場動向等"
      min_chars: 200
      max_chars: 400
      rules:
        - "市場規模・成長率・収益への影響"
        - "競合関係・業界ポジショニングの変化"
        - "誰が儲かるか、どうビジネスが変わるか"
        - "投資判断や経営判断に関わる要素"

    - id: "what_you_can_do"
      name: "今日からできること"
      icon: ""
      when: "具体的なツールやアクションがある場合"
      min_chars: 150
      max_chars: 300
      rules:
        - "今日・今週から試せる具体的なアクション"
        - "ツール名、サービス名、コマンド例など"
        - "学習リソース（公式ドキュメント、チュートリアル）への言及"
        - "「次の一歩」として実行可能なステップ"

    - id: "industry_reaction"
      name: "業界の反応"
      icon: ""
      when: "議論を呼んでいるニュースの場合"
      min_chars: 150
      max_chars: 300
      rules:
        - "賛成意見・反対意見の双方を含める"
        - "関係者や専門家のコメントを引用"
        - "議論の焦点点を明確に"
        - "将来の展開についての言及"

    - id: "background"
      name: "そもそもこれは何？"
      icon: ""
      when: "専門的で背景説明が必要な場合"
      min_chars: 150
      max_chars: 300
      rules:
        - "専門用語を中学生でもわかる言葉に言い換える"
        - "「そもそも〜とは何か」という背景知識を補足"
        - "身近な例え（スマートフォン、日常生活など）を使う"
        - "「結局、私たちの生活にどう関係するのか」を明示"

  # セクション選択の判断基準
  selection_guide:
    - "技術系ニュース → 技術的なポイント + 今日からできること"
    - "ビジネス系ニュース → ビジネスへの影響 + 業界の反応"
    - "規制・倫理系ニュース → そもそもこれは何？ + 業界の反応"
    - "新ツール・サービス → 技術的なポイント + 今日からできること"
    - "上記は参考。ニュースの内容に応じて自由に組み合わせてよい"

---

# ライティングスタイル（write-blogスキル準拠）
writing_style:
  readability:
    - "段落は2〜4文。長い段落は分割する"
    - "一文は15〜20文字"
    - "**太字**で重要なキーワードや数字を強調"
    - "箇条書きを適切に使う（3項目以上のリストは箇条書きに）"

  seo:
    - "Primary keywordを記事タイトルと最初の100字以内に含める"
    - "各H2見出しにはニュースの核心を示すキーワードを含める"

  trustworthiness:
    - "統計データには出典を明記する"
    - "一方的な主張を避け、バランスの取れた見解を提示する"
    - "「〜が期待されます」「〜でしょう」等の曖昧な予測表現を最小限にする"

---

# 記事フォーマット
article_format: |
  ---
  layout: post
  title: "YYYY年M月D日のAIニュース — 最も注目度が高いニュースのキーワードを含む副題"
  date: YYYY-MM-DD
  description: "記事全体の要約。150〜160字。主要キーワードを含める。"
  categories: [ai, daily]
  tags: [自動選定: ニュース内容から3-5個のタグを生成]
  ---

  （フック型の導入文: 今日のニュースで最もインパクトのある数字や事実から始める。2-3文。）

  ## ニュースタイトル — サブタイトル（内容の核心を一言で）

  > 元記事: [ソース名](URL)

  （要約: 150〜300字。H3見出しなしで直接記述。5W1H + 主要数字。）

