# 見出しの例
heading_examples:
  good:
    - "なぜOpenAIは急いでリリースしたのか"
    - "開発者が押さえておくべき3つのポイント"
    - "1100億ドルの資金は何に使われるのか"
    - "今日から試せるコマンド例"
    - "業界の反応が割れている理由"

  bad:
    - "速報まとめ"
    - "開発者視点"
    - "ビジネス視点"
    - "初心者向け解説"
    - "活用アイデア"
