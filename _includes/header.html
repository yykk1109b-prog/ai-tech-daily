<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-mark">AI</span>
      {{ site.title | default: "AI Tech Daily" }}
    </a>
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="site-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <!-- チャットボット体験セクション -->
    <div class="chat-hero">
      <h2>AIチャットボット体験</h2>
      <p>まずはここでチャットボットの使い方を試してみましょう</p>

      <div class="recommended-ai">
        <h3>おすすめするAI</h3>
        <div class="ai-list">
          <a href="https://claude.ai" target="_blank" rel="noopener">
            <span class="ai-icon">🤖</span>
            <span class="ai-name">Claude</span>
            <span class="ai-desc">自然な会話、文章作成</span>
          </a>
          <a href="https://chat.openai.com" target="_blank" rel="noopener">
            <span class="ai-icon">💬</span>
            <span class="ai-name">ChatGPT</span>
            <span class="ai-desc">多彩な機能、大量の知識</span>
          </a>
          <a href="https://gemini.google.com" target="_blank" rel="noopener">
            <span class="ai-icon">✨</span>
            <span class="ai-name">Google Gemini</span>
            <span class="ai-desc">無料で使いやすい</span>
          </a>
        </div>
      </div>
    </div>
    <nav class="site-nav" id="site-nav" role="navigation" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/beginner' | relative_url }}">AI入門</a>
      <a href="{{ '/guides' | relative_url }}">使い方</a>
      <a href="{{ '/examples' | relative_url }}">活用例</a>
      <a href="{{ '/glossary' | relative_url }}">用語集</a>
      <a href="{{ '/categories' | relative_url }}">Categories</a>
      <a href="{{ '/about' | relative_url }}">About</a>
      <a href="{{ '/contact' | relative_url }}">Contact</a>
    </nav>
  </div>
</header>
