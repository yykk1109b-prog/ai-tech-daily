<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Tech pattern - circles -->
  <circle cx="100" cy="100" r="40" fill="#3b82f6" opacity="0.1" />
  <circle cx="1100" cy="530" r="60" fill="#06b6d4" opacity="0.1" />
  <circle cx="150" cy="450" r="35" fill="#3b82f6" opacity="0.08" />
  <circle cx="1050" cy="150" r="45" fill="#06b6d4" opacity="0.08" />

  <!-- Tech lines -->
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#3b82f6" stroke-width="2" opacity="0.2" />
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#06b6d4" stroke-width="2" opacity="0.2" />
  <line x1="300" y1="0" x2="300" y2="630" stroke="#3b82f6" stroke-width="1" opacity="0.15" />
  <line x1="900" y1="0" x2="900" y2="630" stroke="#06b6d4" stroke-width="1" opacity="0.15" />

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentGradient)" />

  <!-- Main text: Site name -->
  <text x="600" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">
    AI Tech Daily
  </text>

  <!-- Subtitle -->
  <text x="600" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="28" text-anchor="middle" fill="#e0f2fe" opacity="0.9">
    AIがテックニュースを毎日分析
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accentGradient)" />
</svg>
